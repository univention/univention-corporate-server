[Global]
jenkins_description: umc performance test
logfile: autotest-umc-performance-test.log


kvm_server: [ENV:KVM_BUILD_SERVER]
kvm_user: [ENV:KVM_USER]
kvm_extra_label: pt-umc-performance
kvm_operating_system: UCS
kvm_template: [ENV:KVM_TEMPLATE]
kvm_ucsversion: [ENV:UCS_VERSION]
kvm_architecture: amd64

kvm_dhcp: 1
kvm_interface: eth0
recover: 8

environment:
 EXTRA_COMPONENT=[ENV:EXTRA_COMPONENT]
 UCS_VERSION=[ENV:UCS_VERSION]
 TARGET_VERSION=[ENV:TARGET_VERSION]
 RELEASE_UPDATE=[ENV:RELEASE_UPDATE]
 ERRATA_UPDATE=[ENV:ERRATA_UPDATE]
 MASTER_IP=[master_IP]
 MASTER_PATCH_IP=[master-patch_IP]
 LOCUST_IP=[locust_IP]
 UCS_ENV_LOCUST_WORKER=12


[master]
kvm_memory: 8G
kvm_vcpus: 4
profile:
 hostname="master"
 domainname="master-umc-performance.test"
 ldap/base="dc=master-umc-performance,dc=test"
 root_password="univention"
 locale/default="en_US.UTF-8:UTF-8"
 packages_install=""
 packages_remove=""
 server/role="domaincontroller_master"
command1:
 . utils.sh && basic_setup
command2:
 . utils.sh && jenkins_updates
command3:
 . utils.sh && assert_join
 . utils.sh && assert_version "[ENV:TARGET_VERSION]"
command4:
 # clone repo
command5:
 # run locust tests against master
command6:
 # run locust tests against master-patch
command7:
 # get log files
files:
 ~/ec2/scripts/activate-errata-test-scope.sh /root/
 ~/ec2/license/license.secret /etc/
 ~/ec2/ram/ram.secrets /etc/

[master-patch]
kvm_memory: 8G
kvm_vcpus: 4
profile:
 hostname="master-patch"
 domainname="master-patch-umc-performance.test"
 ldap/base="dc=master-patch-umc-performance,dc=test"
 root_password="univention"
 locale/default="en_US.UTF-8:UTF-8"
 packages_install=""
 packages_remove=""
 server/role="domaincontroller_master"
command1:
 . utils.sh && basic_setup
command2:
 . utils.sh && jenkins_updates
command3:
 . utils.sh && assert_join
 . utils.sh && assert_version "[ENV:TARGET_VERSION]"
command4:
 # clone repo
command5:
 # run locust tests against master
command6:
 # run locust tests against master-patch
command7:
 # get log files
files:
 ~/ec2/scripts/activate-errata-test-scope.sh /root/
 ~/ec2/license/license.secret /etc/
 ~/ec2/ram/ram.secrets /etc/

[locust1]

kvm_memory: 8G
kvm_vcpus: 4
profile:
 hostname="locust"
 domainname="locust-umc-performance.test"
 ldap/base="dc=locust-umc-performance,dc=test"
 root_password="univention"
 locale/default="en_US.UTF-8:UTF-8"
 packages_install=""
 packages_remove=""
 server/role="domaincontroller_master"
command1:
 . utils.sh && basic_setup
command2:
 . utils.sh && jenkins_updates
command3:
 # check version
command4:
 univention-install -y git
 git clone https://git.knut.univention.de/jbroders/locus_test.git --depth 1 --branch idelgado/5.0-3/56089-Create-a-locust-test-to-measure-UMC
command5:
 # run locust tests against master
 # update the master.env file to add the LOCUST_HOST to https://master-umc-performance.test
 cd locus_test && mkdir -p results && chmod a+w results
 sed -i 's/LOCUST_HOST=/LOCUST_HOST=https:\/\/master-umc-performance.test/g' locus_test/master.env
 cd locust_test && docker-compose up --scale worker=[ENV:UCS_ENV_LOCUST_WORKER]
 cd locus_test && git reset --hard
 mv ~/locus_test/results ~/locus_test/results-master
command6:
 # run locust tests against master-patch
 cd locus_test && mkdir -p results && chmod a+w results
 sed -i 's/LOCUST_HOST=/LOCUST_HOST=https:\/\/master-patch-umc-performance.test/g' locus_test/master.env
 cd locust_test && docker-compose up --scale worker=[ENV:UCS_ENV_LOCUST_WORKER]
 mv ~/locus_test/results ~/locus_test/results-master-patch
command7:
; . utils.sh && prepare_results
; LOCAL utils/utils-local.sh fetch-results [SELF_IP] [SELF]
 LOCAL test "$UCS_TEST_RUN" = "false" || mkdir -p results-master
 LOCAL test "$UCS_TEST_RUN" = "false" || utils/utils-local.sh fetch-files "root@[SELF_IP]" '/home/results-master/*' results-master
 LOCAL test "$UCS_TEST_RUN" = "false" || mkdir -p results-master-patch
 LOCAL test "$UCS_TEST_RUN" = "false" || utils/utils-local.sh fetch-files "root@[SELF_IP]" '/home/results-master-patch/*' results-master-patch
